<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2d6a4f"/>
  <title>Rayong Trail · ผลการวิ่งทั้งหมด</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>

  <style>
    :root { color-scheme: light; }
    html, body, #root { margin: 0; padding: 0; min-height: 100%; }
    body {
      font-family: 'Geist', 'Noto Sans Thai', ui-sans-serif, system-ui, sans-serif;
      color: #1f2a1c; background: #f5f1e8;
      -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    }
    * { box-sizing: border-box; }
    .trt-nav { display: flex; gap: 6px; align-items: center; padding: 10px 20px; background: #fff;
      border-bottom: 1px solid #e5e0d3; font-family: 'Geist Mono', ui-monospace, monospace; font-size: 11px; }
    .trt-nav a { color: #5d6b59; text-decoration: none; padding: 6px 10px; border-radius: 6px; }
    .trt-nav a.active { color: #fff; background: #2d6a4f; }
    .trt-nav a:hover:not(.active) { background: #f5f1e8; color: #1f4d39; }
  </style>
</head>
<body>
  <nav class="trt-nav">
    <a href="../">📱 App</a>
    <a href="../monitor.html">🖥 Live Monitor</a>
    <a class="active" href="./">📊 Results</a>
    <a href="../admin/">🔧 Admin</a>
  </nav>
  <script>
    window.TRT_API_URL = 'https://script.google.com/macros/s/AKfycbxIaYNeW3DkIbIEGmWYL93eL903qyi409Mrlf1NUqMld6dEQDOq9YQEvExjitgVQGp0Zw/exec';
  </script>

  <div id="root"></div>

  <script src="../src/api.js?v=10"></script>
  <script src="../src/firebase-config.js"></script>
  <script type="module" src="../src/firebase.js"></script>
  <script src="../src/event-status.js"></script>
  <script src="../src/event-store.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const BRAND = '#2d6a4f';
    const BRAND_DK = '#1f4d39';
    const TEXT = '#1f2a1c';
    const MUTED = '#5d6b59';
    const BORDER = '#d8d2c2';
    const MONO = '"Geist Mono", ui-monospace, "SF Mono", monospace';

    function fmtElapsed(ms) {
      if (!ms || ms < 0) return '—';
      const s = Math.floor(ms / 1000);
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const r = s % 60;
      return (h > 0 ? h + ':' + String(m).padStart(2, '0') : m) + ':' + String(r).padStart(2, '0');
    }
    function fmtClockOfDay(ts) {
      if (!ts) return '—';
      const d = new Date(Number(ts));
      return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
    }
    function maskPhone(p) {
      const s = String(p || '');
      if (s.length < 4) return s;
      return s.slice(0,3) + '••••' + s.slice(-2);
    }

    function buildResults(state) {
      if (!state) return null;
      const byRunner = new Map();
      (state.checkins || []).forEach(c => {
        if (!byRunner.has(c.runner_id)) byRunner.set(c.runner_id, []);
        byRunner.get(c.runner_id).push(c);
      });
      const items = (state.runners || []).map(r => {
        const cks = (byRunner.get(r.id) || [])
          .slice().sort((a,b)=>Number(a.timestamp) - Number(b.timestamp));
        const start = cks.find(c => c.cp === 'start');
        const finish = cks.find(c => c.cp === 'finish');
        const last = cks[cks.length - 1];
        const totalMs = start && finish ? Number(finish.timestamp) - Number(start.timestamp) : null;
        const distKm = parseInt(r.distance_current, 10) || 0;
        const paceMinPerKm = (totalMs && distKm) ? (totalMs / 60000) / distKm : null;
        return {
          id: r.id,
          name: r.name,
          phone: maskPhone(r.phone),
          distance: r.distance_current,
          distance_original: r.distance_original,
          status: r.status,
          start_at: start ? Number(start.timestamp) : null,
          finish_at: finish ? Number(finish.timestamp) : null,
          last_cp: last ? last.cp : null,
          last_at: last ? Number(last.timestamp) : null,
          total_ms: totalMs,
          pace_min_per_km: paceMinPerKm,
          checkin_count: cks.length,
        };
      });

      // Compute rank within distance for finished runners.
      const byDist = {};
      items.forEach(it => {
        const key = it.distance || '?';
        (byDist[key] = byDist[key] || []).push(it);
      });
      Object.values(byDist).forEach(arr => {
        arr.filter(x => x.status === 'finished')
          .sort((a,b) => (a.finish_at||0) - (b.finish_at||0))
          .forEach((x, i) => { x.rank = i + 1; });
      });
      const totalFinPerDist = {};
      Object.keys(byDist).forEach(k => {
        totalFinPerDist[k] = byDist[k].filter(x => x.status === 'finished').length;
      });
      items.forEach(it => { it.total_finishers = totalFinPerDist[it.distance] || 0; });
      return items;
    }

    function ResultsPage() {
      const [state, setState] = useState(null);
      const [err, setErr] = useState(null);
      const [lastAt, setLastAt] = useState(null);
      const [distFilter, setDistFilter] = useState('all');
      const [statusFilter, setStatusFilter] = useState('all');
      const [query, setQuery] = useState('');
      const [events, setEvents] = useState(() => (window.eventStore ? window.eventStore.loadEvents() : []));
      const [eventId, setEventId] = useState(() => {
        const list = window.eventStore ? window.eventStore.loadEvents() : [];
        const live = list.find(e => window.eventStatus.computeStatus(e) === 'live');
        return (live || list[0] || {}).id || null;
      });
      const selectedEvent = events.find(e => e.id === eventId) || null;

      useEffect(() => {
        const refresh = () => setEvents(window.eventStore.loadEvents());
        window.addEventListener('trt:events-updated', refresh);
        return () => window.removeEventListener('trt:events-updated', refresh);
      }, []);

      useEffect(() => {
        let cancelled = false;
        const tick = async () => {
          try {
            const live = await window.api('state',
              window.TRT_DASHBOARD_KEY ? { key: window.TRT_DASHBOARD_KEY } : {});
            if (cancelled) return;
            setState(live); setErr(null); setLastAt(Date.now());
          } catch (e) {
            if (!cancelled) setErr(e.code || e.message || 'fetch_failed');
          }
        };
        tick();
        const id = setInterval(tick, 30000);
        return () => { cancelled = true; clearInterval(id); };
      }, []);

      const items = useMemo(() => buildResults(state), [state]);

      const filtered = useMemo(() => {
        if (!items) return [];
        let out = items.slice();
        if (distFilter !== 'all') out = out.filter(it => it.distance === distFilter);
        if (statusFilter !== 'all') out = out.filter(it => it.status === statusFilter);
        if (query.trim()) {
          const q = query.trim().toLowerCase();
          out = out.filter(it =>
            (it.name || '').toLowerCase().indexOf(q) >= 0 ||
            (it.phone || '').indexOf(q.replace(/\D/g,'')) >= 0);
        }
        // Sort: finished first (by rank), then active (by progress / last_at desc), then dnf
        const order = { finished: 0, active: 1, dnf: 2 };
        out.sort((a,b) => {
          const oa = order[a.status] ?? 9, ob = order[b.status] ?? 9;
          if (oa !== ob) return oa - ob;
          if (a.status === 'finished') return (a.rank || 999) - (b.rank || 999);
          if (a.status === 'active') return (b.last_at || 0) - (a.last_at || 0);
          return (b.last_at || 0) - (a.last_at || 0);
        });
        return out;
      }, [items, distFilter, statusFilter, query]);

      const counts = useMemo(() => {
        const c = { total: items?.length || 0, finished: 0, active: 0, dnf: 0,
          d11: 0, d22: 0, d29: 0 };
        (items || []).forEach(it => {
          if (it.status === 'finished') c.finished++;
          else if (it.status === 'active') c.active++;
          else if (it.status === 'dnf') c.dnf++;
          if (it.distance === '11K') c.d11++;
          else if (it.distance === '22K') c.d22++;
          else if (it.distance === '29K') c.d29++;
        });
        return c;
      }, [items]);

      const ago = lastAt ? Math.floor((Date.now() - lastAt) / 1000) : null;

      return (
        <div style={{ maxWidth: 900, margin: '0 auto', padding: '20px 16px 60px' }}>
          {/* Header */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 12, paddingBottom: 16,
            borderBottom: `2px solid ${BRAND}` }}>
            <img src="../assets/rayong-trail-logo.jpg" alt=""
              style={{ width: 48, height: 'auto', borderRadius: 6 }}/>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 18, fontWeight: 700, color: BRAND_DK,
                letterSpacing: '-0.01em', lineHeight: 1.1 }}>
                {selectedEvent ? selectedEvent.name : 'Rayong Trail Running'}
              </div>
              <div style={{ fontFamily: MONO, fontSize: 10, letterSpacing: '0.14em',
                textTransform: 'uppercase', color: MUTED, marginTop: 2 }}>
                {selectedEvent ? selectedEvent.date : ''} · ผลการวิ่ง / All Results
              </div>
            </div>
            <a href="../" style={{ fontFamily: MONO, fontSize: 11, color: MUTED,
              textDecoration: 'none', padding: '6px 10px', border: `1px solid ${BORDER}`,
              borderRadius: 6 }}>← หน้าหลัก</a>
          </div>

          {/* Event picker */}
          {events.length > 0 && (
            <div style={{ marginTop: 12, display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ fontFamily: MONO, fontSize: 10, letterSpacing: '0.08em',
                textTransform: 'uppercase', color: MUTED }}>งานแข่ง</span>
              <select value={eventId || ''} onChange={e => setEventId(e.target.value)} style={{
                flex: 1, maxWidth: 360, padding: '7px 10px', border: `1px solid ${BORDER}`,
                borderRadius: 6, background: '#fff', fontSize: 13, fontFamily: 'inherit' }}>
                {events.map(ev => (
                  <option key={ev.id} value={ev.id}>{ev.name} · {ev.date}</option>
                ))}
              </select>
            </div>
          )}
          {events.length > 1 && (
            <div style={{ marginTop: 6, fontFamily: MONO, fontSize: 10, color: MUTED, lineHeight: 1.5 }}>
              ⚠ ผลการวิ่งด้านล่างดึงจาก backend ทดสอบชุดเดียว ยังไม่ได้แยกข้อมูลตามงานที่เลือก — ต้องต่อ backend จริงต่องานก่อนถึงจะกรองตามงานได้จริง
            </div>
          )}

          {/* KPI strip */}
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 8,
            marginTop: 16 }}>
            <Kpi label="นักวิ่งทั้งหมด" value={counts.total} sub={`${counts.d29} · ${counts.d22} · ${counts.d11}`}/>
            <Kpi label="เข้าเส้นชัย" value={counts.finished} accent={BRAND}/>
            <Kpi label="ยังวิ่ง" value={counts.active}/>
            <Kpi label="DNF / ถอน" value={counts.dnf} accent="#b91c1c"/>
          </div>

          {/* Status banner */}
          <div style={{ marginTop: 12, fontFamily: MONO, fontSize: 10, color: MUTED,
            display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
            <span>
              {err
                ? <span style={{ color: '#b91c1c' }}>⚠ โหลดข้อมูลไม่ได้ · {err}</span>
                : ago != null ? <>🛰 live · อัปเดต {ago}s ที่แล้ว · auto-refresh ทุก 30s</> : 'กำลังโหลด…'}
            </span>
            <button onClick={() => { setLastAt(null); window.location.reload(); }} style={{
              fontFamily: MONO, fontSize: 10, padding: '4px 10px', cursor: 'pointer',
              border: `1px solid ${BORDER}`, borderRadius: 6, background: '#fff', color: TEXT,
            }}>↻ refresh</button>
          </div>

          {/* Filters */}
          <div style={{ marginTop: 14, display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            <FilterGroup value={distFilter} onChange={setDistFilter} options={[
              ['all','ทั้งหมด'],['29K','29K'],['22K','22K'],['11K','11K'],
            ]}/>
            <FilterGroup value={statusFilter} onChange={setStatusFilter} options={[
              ['all','ทั้งหมด'],['finished','เข้าเส้น'],['active','ยังวิ่ง'],['dnf','DNF'],
            ]}/>
            <input value={query} onChange={e => setQuery(e.target.value)}
              placeholder="ค้นหา ชื่อ / เบอร์"
              style={{ flex: 1, minWidth: 160, padding: '8px 12px', border: `1px solid ${BORDER}`,
                borderRadius: 6, background: '#fff', fontSize: 13, fontFamily: 'inherit' }}/>
          </div>

          {/* Results table */}
          <div style={{ marginTop: 14, background: '#fff', border: `1px solid ${BORDER}`,
            borderRadius: 8, overflow: 'hidden' }}>
            {!items && !err && (
              <div style={{ padding: 24, textAlign: 'center', fontFamily: MONO, fontSize: 11,
                color: MUTED }}>กำลังโหลดผลการวิ่ง…</div>
            )}
            {filtered.length === 0 && items && (
              <div style={{ padding: 24, textAlign: 'center', fontFamily: MONO, fontSize: 11,
                color: MUTED }}>ไม่พบนักวิ่งตามฟิลเตอร์นี้</div>
            )}
            {filtered.map((it, i) => (
              <ResultRow key={it.id || i} it={it} index={i}/>
            ))}
          </div>

          <div style={{ marginTop: 20, fontFamily: MONO, fontSize: 10, color: MUTED,
            textAlign: 'center' }}>
            หน้านี้แสดงผลของนักวิ่งทุกคนที่ลงทะเบียนหรือเช็คอินผ่านระบบ · เบอร์โทรถูกซ่อนไว้
          </div>
        </div>
      );
    }

    function Kpi({ label, value, sub, accent }) {
      return (
        <div style={{ background: '#fff', border: `1px solid ${BORDER}`, borderRadius: 8,
          padding: '10px 12px' }}>
          <div style={{ fontFamily: MONO, fontSize: 9, letterSpacing: '0.08em',
            textTransform: 'uppercase', color: MUTED }}>{label}</div>
          <div style={{ fontSize: 22, fontWeight: 700, color: accent || TEXT,
            marginTop: 2, letterSpacing: '-0.01em' }}>{value}</div>
          {sub && <div style={{ fontFamily: MONO, fontSize: 10, color: MUTED, marginTop: 2 }}>{sub}</div>}
        </div>
      );
    }

    function FilterGroup({ value, onChange, options }) {
      return (
        <div style={{ display: 'flex', gap: 4, background: '#fff', padding: 3,
          border: `1px solid ${BORDER}`, borderRadius: 6 }}>
          {options.map(([k, label]) => (
            <button key={k} onClick={() => onChange(k)} style={{
              padding: '6px 10px', border: 'none', cursor: 'pointer',
              background: value === k ? BRAND : 'transparent',
              color: value === k ? '#fff' : TEXT, borderRadius: 4,
              fontFamily: MONO, fontSize: 11, fontWeight: 600,
            }}>{label}</button>
          ))}
        </div>
      );
    }

    function ResultRow({ it, index }) {
      const isFin = it.status === 'finished';
      const isDnf = it.status === 'dnf';
      const adjusted = it.distance_original && it.distance_original !== it.distance;
      const paceStr = (() => {
        if (!it.pace_min_per_km) return null;
        const mm = Math.floor(it.pace_min_per_km);
        const ss = Math.round((it.pace_min_per_km - mm) * 60);
        return `${mm}'${String(ss).padStart(2,'0')}"/กม.`;
      })();
      const lastLabel = (() => {
        if (!it.last_cp) return null;
        if (it.last_cp === 'start') return 'จุดสตาร์ท';
        if (it.last_cp === 'a1') return 'A1';
        if (it.last_cp === 'a2') return 'A2';
        if (it.last_cp === 'finish') return 'เส้นชัย';
        return it.last_cp;
      })();
      return (
        <div style={{ display: 'grid',
          gridTemplateColumns: '46px 1fr auto auto',
          gap: 10, padding: '12px 14px',
          alignItems: 'center',
          borderTop: index ? `1px solid ${BORDER}` : 'none',
          background: isFin ? '#fff' : isDnf ? '#fef7f7' : '#fffbf2',
        }}>
          {/* Rank or status badge */}
          <div style={{ textAlign: 'center' }}>
            {isFin && it.rank ? (
              <div style={{ fontSize: 16, fontWeight: 700, color: BRAND_DK,
                fontStyle: 'italic' }}>#{it.rank}</div>
            ) : isDnf ? (
              <div style={{ fontFamily: MONO, fontSize: 10, color: '#b91c1c',
                fontWeight: 700 }}>DNF</div>
            ) : (
              <div style={{ fontFamily: MONO, fontSize: 10, color: '#b45309',
                fontWeight: 700 }}>RUN</div>
            )}
          </div>
          {/* Name + meta */}
          <div style={{ minWidth: 0 }}>
            <div style={{ fontSize: 15, fontWeight: 600, color: TEXT,
              whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
              {it.name}
            </div>
            <div style={{ fontFamily: MONO, fontSize: 10, color: MUTED, marginTop: 2 }}>
              {it.phone}
              {isFin ? null
                : isDnf
                  ? <> · ที่ {lastLabel} · {fmtClockOfDay(it.last_at)}</>
                  : <> · ล่าสุดที่ {lastLabel} · {fmtClockOfDay(it.last_at)}</>}
            </div>
          </div>
          {/* Distance pill */}
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end',
            gap: 2 }}>
            <div style={{ padding: '3px 8px', borderRadius: 999, fontSize: 11,
              fontWeight: 700, fontFamily: MONO, color: '#fff',
              background: it.distance === '29K' ? BRAND_DK
                : it.distance === '22K' ? '#e07a3e'
                : it.distance === '11K' ? '#3a86c4' : MUTED }}>
              {it.distance || '—'}
            </div>
            {adjusted && (
              <div style={{ fontFamily: MONO, fontSize: 9, color: MUTED }}>
                จาก {it.distance_original}
              </div>
            )}
          </div>
          {/* Time / pace */}
          <div style={{ textAlign: 'right', minWidth: 70 }}>
            {isFin ? (
              <>
                <div style={{ fontFamily: MONO, fontSize: 14, fontWeight: 700, color: TEXT,
                  fontVariantNumeric: 'tabular-nums' }}>
                  {fmtElapsed(it.total_ms)}
                </div>
                {paceStr && <div style={{ fontFamily: MONO, fontSize: 10, color: MUTED }}>
                  {paceStr}
                </div>}
              </>
            ) : (
              <div style={{ fontFamily: MONO, fontSize: 10, color: MUTED }}>
                {it.start_at ? `ออกตัว ${fmtClockOfDay(it.start_at)}` : '—'}
              </div>
            )}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<ResultsPage/>);
  </script>
</body>
</html>
